site_name: textfsm-ai
site_url: https://geeks-trident-llc.github.io/textfsm-ai/
repo_url: https://github.com/Geeks-Trident-LLC/textfsm-ai
repo_name: Geeks-Trident-LLC/textfsm-ai

theme:
  name: material
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate
    - toc.integrate
  palette:
    - scheme: default

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true

markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details

nav:
  - Home: index.md

  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md

  - CLI Guide: cli/index.md

  - API Reference:
      - Overview: reference/index.md

  - Golden Tests: golden-tests/index.md

  - Changelog: changelog.md
