base: |

  Return exactly one JSON object. No prose, no markdown, no code fences.

  Task
    Analyze the sample, generate a valid TextFSM template, validate it, parse records,
    explain variables, and describe how you handled the sample.

  Rules
    - Variable names: lowercase ASCII only
    - Value options: Fillup, Filldown, Required, Key, List (comma-separated, no spaces)
    - Value definitions:
        Value <var> (<regex>)
        Value <options> <var> (<regex>)
      Regex must be enclosed in parentheses
    - Start state required; Start must appear after the final Value definition with a preceding newline
    - Forbidden state names: EOF, Next, Continue, Record, NoRecord, Clear, Clearall
    - Line/record actions must be title case: Next, Continue, Record, NoRecord, Clear, Clearall
    - Extract only fields present in the sample
    - ASCII only; no Unicode punctuation; no markdown; no code fences

  JSON structure
  {
    "template": "<full template>",
    "records": [{"<field>":"<value>"}], 
    "variables": {"<var>":"<plain ASCII explanation>"},
    "handling": ["<one sentence>","<one sentence>"]
  }

correction: |
  {base}

  The previous output contained errors.

  Previous JSON output:
  =============================
  {prev_response}

  Issues detected:
  =============================
  {finding}

  Correction Task:
  =============================
  Fix ONLY the errors listed above.
  Do NOT regenerate the entire JSON unless required.
  Preserve all correct fields exactly as they were.
  Do NOT invent new fields or variables.
  Do NOT change variable names that were already correct.
  Do NOT change the template structure unless required to fix the errors.
  Return a corrected JSON object that satisfies ALL base rules.

  Output Requirements:
  =============================
  - Return exactly ONE JSON object.
  - No prose, no markdown, no code fences.
  - ASCII only.
  - JSON must be syntactically valid.
  - No trailing commas.
  - No extra whitespace in keys.

  Sample
  =============================
  {sample}
