[tox]
envlist = py39, py312, lint, format, typecheck
isolated_build = true
skip_missing_interpreters = true

[testenv]
description = Run tests with coverage
extras = dev
commands =
    pytest --cov=textfsm_ai --cov-report=term --cov-report=html

[testenv:lint]
description = Ruff fix → Ruff format → Black check
skip_install = true
deps =
    ruff
    black
commands =
    ruff check --fix .
    ruff format .
    black . --check

[testenv:format]
description = Ruff fix → Ruff format → Black fix
skip_install = true
deps =
    ruff
    black
commands =
    ruff check --fix .
    ruff format .
    black .

[testenv:typecheck]
description = Run mypy type checking
skip_install = true
deps =
    mypy
    types-PyYAML
commands =
    mypy textfsm_ai
