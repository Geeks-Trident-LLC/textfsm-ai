[tox]
envlist = py39, py312, lint, format, typecheck
isolated_build = true
skip_missing_interpreters = true

[testenv]
description = Run tests with coverage
deps =
    pytest
    pytest-cov
commands =
    pytest --cov=textfsm_ai --cov-report=term --cov-report=html

[testenv:lint]
description = Run Ruff lint checks
skip_install = true
deps = ruff
commands =
    ruff check .

[testenv:format]
description = Check Black formatting
skip_install = true
deps = black
commands =
    black . --check

[testenv:typecheck]
description = Run mypy type checking
skip_install = true
deps =
    mypy
    types-PyYAML
commands =
    mypy textfsm_ai
