[tox]
envlist = py39, py312, lint, typecheck
isolated_build = true
skip_missing_interpreters = true

[testenv]
description = Run tests with coverage
deps =
    pytest
    pytest-cov
commands =
    pytest --cov=textfsm_ai --cov-report=term --cov-report=html

[testenv:lint]
description = Run ruff lint and formatting checks
deps =
    ruff
commands =
    ruff check .
    ruff format --check .

[testenv:typecheck]
description = Run mypy type checking
usedevelop = true
deps =
    mypy
    types-PyYAML
commands =
    mypy textfsm_ai

