[tox]
envlist = py39, py312, format, lint, typecheck
isolated_build = true
skip_missing_interpreters = true

[testenv]
description = Run tests with coverage
extras = dev
commands =
    pytest --cov=textfsm_ai --cov-report=term --cov-report=html

[testenv:lint]
description = Ruff fix → Ruff format → Black check
skip_install = true
deps =
    ruff==0.4.8
    black==24.4.2
commands =
    ruff check --fix .
    ruff format .
    black . --check

[testenv:format]
description = Ruff fix → Ruff format → Black fix
skip_install = true
deps =
    ruff==0.4.8
    black==24.4.2
commands =
    ruff check --fix .
    ruff format .
    black .

[testenv:typecheck]
description = Run mypy type checking
skip_install = true
deps =
    mypy==1.10.0
    types-PyYAML
commands =
    mypy textfsm_ai

[testenv:docs]
description = Build the docs site with mkdocs (strict mode)
deps =
    mkdocs==1.6.1
    mkdocs-material==9.7.6
    mkdocstrings==1.0.4
    mkdocstrings-python==2.0.3
commands =
    mkdocs build --strict
