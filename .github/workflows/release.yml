name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Test (tox)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.9"
            tox-env: "py39"
          - python-version: "3.12"
            tox-env: "py312"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install tox
        run: python -m pip install tox

      - name: Run tox tests
        run: tox -e ${{ matrix.tox-env }}

  lint:
    name: Lint (tox)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install tox
        run: python -m pip install tox

      - name: Run lint
        run: tox -e lint

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build
        run: python -m pip install build

      - name: Build package
        run: python -m build

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: pypi-release
      url: https://pypi.org/project/textfsm-ai/

    permissions:
      id-token: write
      contents: write

    steps:
      - name: Wait for manual approval
        uses: trstringer/manual-approval@v1
        with:
          approvers: tuyen
          minimum-approvals: 1

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.10.0
        with:
          skip-existing: true

  docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install docs tools
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pip install mike

      - name: Deploy versioned docs
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mike deploy --push --update-aliases $VERSION latest
          mike set-default --push latest

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
