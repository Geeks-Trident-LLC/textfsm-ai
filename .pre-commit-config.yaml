repos:
  - repo: local
    hooks:
      - id: verify-version
        name: Verify version consistency
        entry: python scripts/verify-version.py
        language: system
        types: [python]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
        name: Ruff (lint + fix)
        args: ["--fix"]
        language_version: python3

      - id: ruff-format
        name: Ruff Formatter
        language_version: python3

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        name: Black (final formatter)
        language_version: python3
