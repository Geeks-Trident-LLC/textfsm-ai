repos:
  - repo: local
    hooks:
      - id: verify-version
        name: verify-version
        entry: python scripts/verify-version.py
        language: system
        types: [python]

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
